name: Sync from upstream

on:
  workflow_dispatch:
    inputs:
      upstream_owner:
        description: Upstream owner (defaults to platomat)
        required: false
        type: string
      upstream_repo:
        description: Upstream repository (defaults to page-speed-tester-demo)
        required: false
        type: string
      upstream_branch:
        description: Upstream branch (defaults to main)
        required: false
        type: string
      target_branch:
        description: Branch to update in this repo (defaults to main)
        required: false
        type: string
  repository_dispatch:
    types: [sync-upstream]

concurrency:
  group: upstream-sync-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # PAT preferred: pushes then trigger Pages/Worker auto-deploy and private upstreams are reachable.
      # Falls back to GITHUB_TOKEN (origin push works; deploy hooks and private upstream fetch may not).
      SYNC_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN || github.token }}
      UPSTREAM_OWNER: ${{ github.event.client_payload.upstream_owner || github.event.inputs.upstream_owner || 'platomat' }}
      UPSTREAM_REPO: ${{ github.event.client_payload.upstream_repo || github.event.inputs.upstream_repo || 'page-speed-tester-demo' }}
      UPSTREAM_BRANCH: ${{ github.event.client_payload.upstream_branch || github.event.inputs.upstream_branch || 'main' }}
      TARGET_BRANCH: ${{ github.event.client_payload.target_branch || github.event.inputs.target_branch || 'main' }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.target_branch || github.event.inputs.target_branch || 'main' }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.UPSTREAM_SYNC_TOKEN || github.token }}

      - name: Configure git identity
        run: |
          git config user.name "page-speed-tester-bot"
          git config user.email "page-speed-tester-bot@users.noreply.github.com"

      - name: Merge upstream and push
        id: merge
        run: |
          set -euo pipefail
          UPSTREAM_URL="https://x-access-token:${SYNC_TOKEN}@github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"
          UPSTREAM_REF="upstream/${UPSTREAM_BRANCH}"
          echo "Fetching ${UPSTREAM_OWNER}/${UPSTREAM_REPO}@${UPSTREAM_BRANCH}…"
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH"

          COMMIT_COUNT="$(git rev-list --count HEAD.."$UPSTREAM_REF" || echo 0)"
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "Already up to date."
            echo "sync_status=success" >> "$GITHUB_OUTPUT"
            echo "sync_message=Already up to date" >> "$GITHUB_OUTPUT"
            echo 'sync_commits_json=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS_JSON="$(git log HEAD.."$UPSTREAM_REF" --reverse --format=$'%h\x1f%s' | jq -R -s '
            split("\n") | map(select(length > 0)) |
            map(split("\u001f"; 2)) | map(select(length == 2)) |
            map({sha: .[0], subject: .[1]})
          ')"
          {
            echo 'sync_commits_json<<EOF'
            echo "$COMMITS_JSON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          {
            echo "Merge upstream ${UPSTREAM_OWNER}/${UPSTREAM_REPO}@${UPSTREAM_BRANCH}"
            echo
            echo "Upstream commits (${COMMIT_COUNT}):"
            git log --format='- %s (%h)' HEAD.."$UPSTREAM_REF" --reverse
          } > /tmp/merge-msg.txt

          SYNC_SUMMARY="Merged ${COMMIT_COUNT} commit(s) from ${UPSTREAM_OWNER}/${UPSTREAM_REPO}@${UPSTREAM_BRANCH}"
          {
            echo 'sync_message<<EOF'
            echo "$SYNC_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          if git merge --no-edit -F /tmp/merge-msg.txt "$UPSTREAM_REF"; then
            SHA="$(git rev-parse HEAD)"
            echo "Merge succeeded ($SHA). Pushing to origin/${TARGET_BRANCH}…"
            git push origin "HEAD:${TARGET_BRANCH}"
            echo "sync_status=success" >> "$GITHUB_OUTPUT"
            echo "sync_sha=$SHA" >> "$GITHUB_OUTPUT"
          else
            echo "Merge conflict — aborting."
            git merge --abort || true
            echo "sync_status=conflict" >> "$GITHUB_OUTPUT"
            {
              echo 'sync_message<<EOF'
              echo "Merge conflict — resolve manually with git"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Report result to Worker
        if: always()
        env:
          WORKER_API_URL: ${{ secrets.WORKER_API_URL }}
          WORKER_API_SECRET: ${{ secrets.WORKER_API_SECRET }}
          SYNC_STATUS: ${{ steps.merge.outputs.sync_status || 'error' }}
          SYNC_SHA: ${{ steps.merge.outputs.sync_sha || '' }}
          SYNC_MESSAGE: ${{ steps.merge.outputs.sync_message || 'Upstream sync failed before merge' }}
          SYNC_COMMITS_JSON: ${{ steps.merge.outputs.sync_commits_json || '[]' }}
        run: |
          if [ -z "${WORKER_API_URL:-}" ] || [ -z "${WORKER_API_SECRET:-}" ]; then
            echo "WORKER_API_URL / WORKER_API_SECRET not set — skipping result report."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $WORKER_API_SECRET" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg status "$SYNC_STATUS" \
              --arg sha "$SYNC_SHA" \
              --arg message "$SYNC_MESSAGE" \
              --argjson upstream_commits "$SYNC_COMMITS_JSON" \
              --arg github_run_id "${{ github.run_id }}" \
              '{status:$status, sha:$sha, message:$message, upstream_commits:$upstream_commits, github_run_id:$github_run_id}')" \
            "$WORKER_API_URL/api/internal/upstream-sync/result" \
            || echo "Warning: failed to report sync result to Worker"
